name: Build & Release

on:
  push:
    branches: [main, master]
    tags: [v*]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # go.sum 不在仓库中，禁用缓存避免报错

      # go mod tidy 生成 go.sum 并拉取所有依赖
      - name: Tidy & download dependencies
        run: |
          go mod tidy
          go mod download
        env:
          GONOSUMDB: "*"
          GOFLAGS: "-mod=mod"

      - name: Build
        run: |
          $tag = git describe --tags --always 2>$null
          if (-not $tag -or $tag -eq "") { $tag = "dev" }
          Write-Host "Version: $tag"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -ldflags "-s -w -X main.Version=$tag" -o dist\openclaw-manager-amd64.exe .
          $size = (Get-Item dist\openclaw-manager-amd64.exe).Length
          Write-Host "OK: $size bytes"
        env:
          GOFLAGS: "-mod=mod"

      - name: Compute SHA256
        run: |
          $hash = (Get-FileHash dist\openclaw-manager-amd64.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  openclaw-manager-amd64.exe" | Out-File -Encoding ascii dist\SHA256SUMS.txt
          Write-Host "SHA256: $hash"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-manager-windows-amd64
          path: |
            dist/openclaw-manager-amd64.exe
            dist/SHA256SUMS.txt
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openclaw-manager-amd64.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
